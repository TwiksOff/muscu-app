<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080809">
  <title>STRONG BOY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>


<body>

  <div class="status-bar-spacer"></div>

  <div class="app">

    <!-- ── DASHBOARD ── -->
    <div class="page active" id="page-dashboard">
      <div class="page-scroll">
        <div class="top-bar">
          <div class="top-bar-logo">STRONG<span>.</span>BOY</div>
          <button class="icon-btn" onclick="openMenu()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        <div class="greeting-block">
          <div class="greeting-label" id="greeting-label">Bonjour</div>
          <div class="greeting-date" id="greeting-date">…</div>
        </div>
        <div id="streak-banner"></div>
        <div id="suggestion-block"></div>
        <div class="stats-scroll" id="stats-row"></div>
        <div class="section-header">
          <span class="section-title">Récentes</span>
          <button class="text-btn" onclick="showPage('sessions')">Voir tout</button>
        </div>
        <div id="recent-sessions"></div>
        <div class="section-header" style="margin-top:8px">
          <span class="section-title">7 derniers jours</span>
        </div>
        <div id="week-heatmap-dash"></div>
        <div style="height:8px"></div>
      </div>
    </div>

    <!-- ── SESSIONS ── -->
    <div class="page" id="page-sessions">
      <div class="page-scroll">
        <div class="top-bar">
          <div class="top-bar-title">Séances</div>
          <button class="icon-btn" onclick="openNewSessionModal()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="search-bar-wrap">
          <svg class="search-bar-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-bar-input" id="sessions-search" placeholder="Rechercher une séance ou exercice…" oninput="filterSessions(this.value)" autocomplete="off" autocorrect="off">
        </div>
        <div id="all-sessions"></div>
      </div>
    </div>

    <!-- ── SESSION DETAIL ── -->
    <div class="page" id="page-detail">
      <div class="page-scroll">
        <div class="top-bar">
          <button class="back-btn-top" onclick="goBackFromDetail()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            Retour
          </button>
          <div id="detail-top-actions"></div>
        </div>
        <div id="session-detail-content"></div>
      </div>
    </div>

    <!-- ── PRESETS ── -->
    <div class="page" id="page-presets">
      <div class="page-scroll">
        <div class="top-bar">
          <div class="top-bar-title">Presets</div>
          <button class="icon-btn" onclick="openNewPresetSheet()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="presets-list"></div>
      </div>
    </div>

    <!-- ── STATS ── -->
    <div class="page" id="page-progress">
      <div class="page-scroll">
        <div class="top-bar">
          <div class="top-bar-title">Statistiques</div>
        </div>
        <div id="progress-content"></div>
      </div>
    </div>

  </div><!-- /.app -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" onclick="showPage('sessions')" data-page="sessions">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nav-label">Séances</span>
    </button>
    <button class="nav-item add-center" onclick="openNewSessionModal()">
      <div class="add-center-inner">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </button>
    <button class="nav-item" onclick="showPage('presets')" data-page="presets">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="11"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="18" width="7" height="3"/></svg>
      <span class="nav-label">Presets</span>
    </button>
    <button class="nav-item" onclick="showPage('progress')" data-page="progress">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-label">Stats</span>
    </button>
  </nav>

  <div class="home-indicator-spacer"></div>
  <div class="toast-container" id="toast-container"></div>

  <!-- ── REST TIMER OVERLAY ── -->
  <div class="timer-overlay" id="timer-overlay">
    <div class="timer-card">
      <div class="timer-label-top">REPOS</div>
      <div class="timer-ring-wrap">
        <svg class="timer-svg" viewBox="0 0 140 140">
          <circle class="timer-track" cx="70" cy="70" r="58"/>
          <circle class="timer-progress" id="timer-progress" cx="70" cy="70" r="58"
            stroke-dasharray="364.4" stroke-dashoffset="0"
            transform="rotate(-90 70 70)"/>
        </svg>
        <div class="timer-center">
          <div class="timer-display" id="timer-display">01:30</div>
          <div class="timer-sub" id="timer-sub">sec</div>
        </div>
      </div>
      <div class="timer-presets">
        <button class="timer-preset-btn" onclick="setTimerPreset(60)">1 min</button>
        <button class="timer-preset-btn" onclick="setTimerPreset(90)">1:30</button>
        <button class="timer-preset-btn" onclick="setTimerPreset(120)">2 min</button>
        <button class="timer-preset-btn" onclick="setTimerPreset(180)">3 min</button>
      </div>
      <div class="timer-actions">
        <button class="timer-adj-btn" onclick="adjustTimer(-15)">−15s</button>
        <button class="timer-stop-btn" onclick="stopTimer()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
        <button class="timer-adj-btn" onclick="adjustTimer(+15)">+15s</button>
      </div>
    </div>
  </div>

  <!-- ── MENU DRAWER ── -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeMenu()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-logo">STRONG<span>.</span>BOY</div>
      <button class="icon-btn" onclick="closeMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-profile-card" onclick="openProfileSheet()">
      <div class="drawer-avatar" id="drawer-avatar">?</div>
      <div class="drawer-profile-info">
        <div class="drawer-profile-name" id="drawer-profile-name">Mon Profil</div>
        <div class="drawer-profile-sub" id="drawer-profile-sub">Configurer le profil →</div>
      </div>
    </div>
    <div class="drawer-divider"></div>
    <nav class="drawer-nav">
      <button class="drawer-nav-item" onclick="closeMenu();showPage('dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </button>
      <button class="drawer-nav-item" onclick="closeMenu();showPage('sessions')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Séances
      </button>
      <button class="drawer-nav-item" onclick="closeMenu();showPage('presets')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="11"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="18" width="7" height="3"/>
        </svg>Presets
      </button>
      <button class="drawer-nav-item" onclick="closeMenu();showPage('progress')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Statistiques
      </button>
    </nav>
    <div class="drawer-divider"></div>
    <nav class="drawer-nav">
      <button class="drawer-nav-item" onclick="closeMenu();openProfileSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profil & mensurations
      </button>
      <button class="drawer-nav-item" onclick="openExerciseLibrarySheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Bibliothèque d'exercices
      </button>
      <button class="drawer-nav-item" onclick="closeMenu();openSettingsSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Paramètres
      </button>
    </nav>
    <div class="drawer-footer">
      <span class="drawer-version">STRONG BOY v3.0</span>
    </div>
  </div>

  <!-- ── MAIN BOTTOM SHEET ── -->
  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title"></div>
      <button class="icon-btn" onclick="closeSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-footer" id="sheet-footer"></div>
  </div>

  <!-- ── EXERCISE PICKER ── -->
  <div class="picker-overlay" id="picker-overlay" onclick="closePicker()"></div>
  <div class="picker-sheet" id="picker-sheet">
    <div class="sheet-handle"></div>
    <div class="picker-header">
      <span class="sheet-title">Exercice</span>
      <button class="icon-btn" onclick="closePicker()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="picker-search-wrap">
      <svg class="picker-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="picker-search" id="picker-search" placeholder="Rechercher ou créer…" oninput="filterPicker(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="picker-body" id="picker-body"></div>
  </div>

  <!-- Hidden canvas for share card -->
  <canvas id="share-canvas" style="display:none"></canvas>
  <!-- Hidden file input for data import -->
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImportFile(this)">

  <script src="app.js" defer></script>
</body>
</html>
